<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - La maison des livreurs</title>
    <style>
        /* Réinitialisation globale */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            font-family: "Goudy Old Style", Garamond, serif;
            font-size: calc(0.8rem + 0.5vw);
            font-weight: 400;
            line-height: 1.5;
            color: white;
            text-align: left;
            background: black;
            overflow: hidden;
        }

        /* SECTION INTRO */
        .intro {
            position: relative;
            width: 100%;
            height: 100%;
            background: url("./u.png") no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 11%; /* Légèrement plus à gauche */
        }

        /* Contenu principal */
        .intro-header {
            width: 35em;
            max-width: 90%;
            z-index: 2;
            text-shadow: 0 0 0.5em rgba(0, 0, 0, 0.5);
        }

        /* Titre */
        .intro-title h1 {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 0.2em; /* Moins d’espace entre le titre et la byline */
            color: white;
        }

        /* Byline */
        .intro-byline {
            font-style: italic;
            font-size: 1.2rem;
            color: white;
            margin-left: 0.5em; /* Légèrement décalé à gauche */
        }

        /* Bouton "Commencer" */
        .intro-begin {
            position: absolute;
            z-index: 1000;
            left: 0;
            text-transform: uppercase;
            border: none;
            border-radius: 0 99999px 99999px 0;
            padding: 1em 1.5em;
            margin-left: -0.375em;
            line-height: 1;
            color: #989797;
            background: #fff;
            bottom: calc(1rem + 4vw);
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s, box-shadow 0.2s;
        }
        .intro-begin:hover,
        .intro-begin:active {
            color: #333;
            box-shadow: inset 0 0 0.5em blanchedalmond, 0 0 0.5em -0.25em rgba(255, 255, 255, 0.5);
            transform: translateX(0.375em);
        }

        /* Animation de transition */
        .transition-overlay {
            position: fixed;
            top: 0;
            left: 100%; /* Hors de l'écran */
            width: 100vw;
            height: 100vh;
            background: rgb(0, 0, 0);
            z-index: 2000;
            transition: left 0.8s ease-in-out;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .intro {
                padding-left: 5%;
            }
            .intro-title h1 {
                font-size: 2rem;
            }
            .intro-byline {
                font-size: 1rem;
            }
            .intro-begin {
                font-size: 0.9rem;
                padding: 0.9em 1.1em;
            }
        }
    </style>
</head>
<body>

    <div class="intro">
        <!-- En-tête superposé -->
        <div class="intro-header">
            <div class="intro-title">
                <h1>La Maison des Livreurs</h1>
            </div>
            <div class="intro-byline">
                <p>Réalisé par MMI Bordeaux</p>
            </div>
        </div>

        <!-- Bouton "Commencer" -->
        <button class="intro-begin">Commencer</button>
    </div>

    <!-- Overlay pour transition -->
    <div class="transition-overlay"></div>

    <script>
        document.querySelector(".intro-begin").addEventListener("click", function (event) {
            event.preventDefault();

            // Déclenche l'animation
            document.querySelector(".transition-overlay").style.left = "0";

            // Redirige après l'animation
            setTimeout(() => {
                window.location.href = "index.html";
            }, 800);
        });
    </script>

</body>
</html>

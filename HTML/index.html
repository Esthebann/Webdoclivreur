<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>- La maison des livreurs Vidéo</title>
  <link rel="stylesheet" href="../CSS/index.css">


</head>
<body>
  <!-- Barre de navigation -->
  <nav>
    <a href="accueil.html">Accueil</a>
    <a href="#">Vidéos</a>
    <a href="#">Vidéo linéaire</a>
    <a href="credits.html">Crédits</a>
  </nav>

  <!-- Arrière-plan -->
  <div class="background-image"></div>

  <!-- Contenu principal -->
  <div class="main-content">
    <div class="container">
      <video id="video" autoplay muted playsinline>
        <source src="MVI_0063.MP4" type="video/mp4">
        <track kind="subtitles" src="subtitles.vtt" srclang="fr" label="Français" default>
        Votre navigateur ne supporte pas la vidéo.
      </video>
      <div id="clickable-zone1" class="clickable-zone"></div>
      <div id="clickable-zone2" class="clickable-zone"></div>
      <div id="clickable-zone3" class="clickable-zone"></div>
      <div id="clickable-zone4" class="clickable-zone"></div>
    </div>
  </div>

  <!-- Timeline (route) -->
  <div class="timeline-container">
    <div class="road"></div>
    <div class="timeline-wrapper">
      <div class="timeline-bar" id="timeline-bar">
        <div class="checkpoint" id="checkpoint1">
          <div class="marker"></div>
          <div class="label">Chapitre 1</div>
        </div>
        <div class="checkpoint" id="checkpoint2">
          <div class="marker"></div>
          <div class="label">Chapitre 2</div>
        </div>
      </div>
    </div>
    <img id="restaurant" src="restaurant.png" alt="Restaurant" class="restaurant">
    <div class="character" id="character"></div>
  </div>

  <!-- Bulle de texte finale -->
  <div id="message-bubble" class="message-bubble">Merci pour votre commande</div>

  <!-- Vidéos secondaires -->
  <div id="video-card1" class="video-card">
    <video id="secondary-video1" playsinline>
      <source src="./MVI_0094.MP4" type="video/mp4">
    </video>
  </div>
  <div id="video-card2" class="video-card">
    <video id="secondary-video2" playsinline>
      <source src="./MVI_0094.MP4" type="video/mp4">
    </video>
  </div>
  <div id="video-card3" class="video-card">
    <video id="secondary-video3" playsinline>
      <source src="./MVI_0094.MP4" type="video/mp4">
    </video>
  </div>
  <div id="video-card4" class="video-card">
    <video id="secondary-video4" playsinline>
      <source src="./MVI_0094.MP4" type="video/mp4">
    </video>
  </div>
  <script src="../JS/index.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zoom image de fond sans passer sur la nav ni la route</title>
  <style>
    /********************************************************
     * NAV BAR (50px en haut)
     ********************************************************/
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 9999;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      padding: 10px 20px;
      transition: 0.3s;
    }
    nav a:hover {
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
    }

    /********************************************************
     * CORPS GENERAL
     ********************************************************/
    body {
      margin: 0;
      padding: 0;
      background-color: #525050;
      font-family: sans-serif;
      overflow: hidden;
    }

    /********************************************************
     * CONTENEUR DE L'IMAGE (ENTRE 50px ET 80px)
     ********************************************************/
    .background-image {
      position: fixed;
      top: 0px; /* en-dessous de la nav */
      left: 0;
      opacity: 100%;
      filter: blur(7px);
      right: 0;
      bottom: 80px; /* s’arrête avant la route */
      z-index: 1;
      overflow: hidden;
    }
    .background-image img {
      width: 100%;
      height: auto;
    }

    /********************************************************
     * CONTENU PRINCIPAL ENTRE NAV ET ROUTE
     ********************************************************/
    .main-content {
      position: relative;
      z-index: 3;
      padding-top: 50px;
      padding-bottom: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .image-container {
      position: relative;
      width: 70%;
      max-width: 1100px;
      height: 465px;
    }
    .image-container .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .clickable-zone {
      position: absolute;
      /* La largeur et la hauteur seront définies dynamiquement ou par défaut à 100px */
      border: 2px solid;
      cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 1;
    }
    .clickable-zone:hover {
      transform: scale(1.1);
      opacity: 0.9;
    }

    /********************************************************
     * OVERLAY VIDEO
     ********************************************************/
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-card {
      position: relative;
      width: 60%;
      max-width: 600px;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .video-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .video-card video {
      width: 100%;
      display: block;
    }

    /********************************************************
     * ROUTE (80px) EN BAS
     ********************************************************/
    .chemin-progression {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: #000;
      overflow: hidden;
      z-index: 50;
    }
    .progress-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .moving-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 200%;
      height: 4px;
      background: repeating-linear-gradient(
        to right,
        transparent,
        transparent 40px,
        white 40px,
        white 60px
      );
      transform: translateY(-50%);
      animation: moveLine 10s linear infinite;
    }
    @keyframes moveLine {
      0%   { transform: translateX(0) translateY(-50%); }
      100% { transform: translateX(-50%) translateY(-50%); }
    }
    .points-container {
      position: absolute;
      top: 50%;
      left: 5%;
      width: 90%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      z-index: 60;
    }
    /* Boutons de navigation */
    .points-container button {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: transparent;
      border: 4px solid transparent;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: none;
      overflow: hidden;
      position: relative;
    }
    .points-container button img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }
    .points-container button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }
    .points-container button.point-actif {
      background-color: transparent;
      border-color: transparent;
      box-shadow: none;
      animation: none;
    }

    /* Conteneur regroupant le bouton et le label */
    .point-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80px;
    }
    .point-wrapper span {
      margin-top: -10px; /* Réduit l'espace pour rapprocher le texte du bouton */
      text-align: center;
      font-size: 16px;
      color: #fff;
      white-space: normal;
      word-wrap: break-word;
    }

    /********************************************************
     * PERSONNAGE (Character)
     ********************************************************/
    .character {
      position: absolute;
      top: 0;
      width: 40px;
      height: 40px;
      background-size: contain;
      background-repeat: no-repeat;
      transform: translateX(-50%);
      transition: left 5s ease;
      z-index: 80;
    }
  </style>
</head>
<body>
  <!-- NAV (50px) -->
  <nav>
    <a href="accueil.html">Accueil</a>
    <a href="#">Vidéos</a>
    <a href="#">Vidéo linéaire</a>
    <a href="credits.html">Crédits</a>
  </nav>

  <!-- Image de fond floutée -->
  <div class="background-image">
    <img src="../PICTURE/accidentsfond.png" alt="Fonds">
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="main-content">
    <div class="image-container" id="image-container">
      <!-- L'image de fond et les zones cliquables seront insérées dynamiquement -->
    </div>
  </div>

  <!-- ROUTE ANIMÉE (80px) -->
  <div class="chemin-progression" id="progress-bar">
    <div class="progress-container">
      <div class="moving-line"></div>
      <div class="points-container" id="points-container"></div>
      <div id="character" class="character"></div>
    </div>
  </div>

  <!-- Container pour les vidéo-cards dynamiques -->
  <div id="video-card-container"></div>

  <script>
    /********************************************************
     * IMAGES DU PERSONNAGE
     ********************************************************/
    const baseCyclist = "../PICTURE/livreur.svg";
    const characterScenes = [
      "../PICTURE/cycliste_scene1.svg",
      "../PICTURE/cycliste_scene2.png",
      "../PICTURE/cycliste_scene3.png",
      "../PICTURE/ambulance.svg"
    ];

    /********************************************************
     * DONNÉES DES POINTS AVEC ZONES CONFIGURABLES ET BOUTONS DE NAVIGATION
     ********************************************************/
    const pointsData = [
      {
        image: "../PICTURE/accidentsfond.png",
        navButtonImage: "../PICTURE/maisonmdl.svg",  // Bouton "légal"
        zones: [
          { video: "../PICTURE/MVI_0094.mp4", top: "0%", right: "40%", width: "200px", height: "130px" },
          { video: "../PICTURE/MVI_0094.mp4", bottom: "10%", left: "11%", width: "170px", height: "150px" },
          { video: "../PICTURE/MVI_0094.mp4", top: "32%", right: "10%", width: "280px", height: "150px" },
          { video: "../PICTURE/MVI_0094.mp4", bottom: "0%", right: "0%", width: "450px", height: "150px" }
        ]
      },
      {
        image: "../PICTURE/newfond.png",
        navButtonImage: "../PICTURE/maisonmdl.svg",  // Bouton "Aides"
        zones: [
          { video: "../PICTURE/MVI_0094.mp4", top: "20%", left: "10%", width: "100px", height: "100px" },
          { video: "../PICTURE/MVI_0094.mp4", top: "20%", right: "10%", width: "100px", height: "100px" },
          { video: "../PICTURE/MVI_0096.mp4", bottom: "20%", left: "50%", transform: "translateX(-50%)", width: "100px", height: "100px" }
        ]
      },
      {
        image: "../PICTURE/accidentsfond.png",
        navButtonImage: "../PICTURE/accidentbouton.svg",  // Bouton "accidents"
        zones: [
          { video: "../PICTURE/MVI_0094.mp4", top: "40%", left: "30%", width: "120px", height: "120px" },
          { video: "../PICTURE/MVI_0093.mp4", top: "40%", right: "30%", width: "120px", height: "120px" }
        ]
      },
      {
        image: "../PICTURE/newfond.png",
        navButtonImage: "../PICTURE/hopital.svg",  // Bouton "santé"
        zones: [
          { video: "MVI_0103.mp4", top: "50%", left: "45%", width: "100px", height: "100px" }
        ]
      }
    ];

    let currentPointIndex = 0;
    let watchedCount = 0;

    /********************************************************
     * FONCTION : LOAD PROGRESS BAR
     ********************************************************/
    function loadProgressBar() {
      const pointsContainer = document.getElementById("points-container");
      pointsContainer.innerHTML = "";

      pointsData.forEach((pt, index) => {
        // Création d'un conteneur pour le bouton et le label
        const pointWrapper = document.createElement("div");
        pointWrapper.className = "point-wrapper";

        // Pour le point "condition de travail" (index 3), on augmente la largeur du conteneur
        if (index === 3) {
          pointWrapper.style.width = "200px"; // Ajustez cette valeur si nécessaire
        }

        // Création du bouton
        const btn = document.createElement("button");
        btn.dataset.pointIndex = index;
        if (index === currentPointIndex) {
          btn.classList.add("point-actif");
        }
        if (pt.navButtonImage) {
          const img = document.createElement("img");
          img.src = pt.navButtonImage;
          img.alt = `Bouton ${index + 1}`;
          btn.appendChild(img);
        }
        pointWrapper.appendChild(btn);

        // Création du label
        const label = document.createElement("span");
        if (index === 0) label.textContent = "légal";
        else if (index === 1) label.textContent = "Aides";
        else if (index === 2) label.textContent = "accidents";
        else if (index === 3) {
          label.textContent = "condition de travail";
          label.style.whiteSpace = "nowrap"; // Empêche le retour à la ligne
        }
        pointWrapper.appendChild(label);

        pointsContainer.appendChild(pointWrapper);

        btn.addEventListener("click", () => {
          currentPointIndex = index;
          document.getElementById("character").style.backgroundImage =
            currentPointIndex === 3 ? "url('../PICTURE/ambulance.svg')" : "url('" + baseCyclist + "')";
          loadPoint(currentPointIndex);
          updateProgressBar();
        });
      });
      updateCharacterPosition();
    }

    /********************************************************
     * FONCTION : UPDATE PROGRESS BAR & POSITION DU PERSONNAGE
     ********************************************************/
    function updateProgressBar() {
      const pointsContainer = document.getElementById("points-container");
      if (!pointsContainer) return;
      // Réinitialiser les classes actives sur tous les boutons
      pointsContainer.querySelectorAll("button").forEach(btn => btn.classList.remove("point-actif"));
      const activeBtn = pointsContainer.querySelector(`button[data-point-index="${currentPointIndex}"]`);
      if (activeBtn) {
        activeBtn.classList.add("point-actif");
      }
      updateCharacterPosition();
    }

    function updateCharacterPosition() {
      const pointsContainer = document.getElementById("points-container");
      const character = document.getElementById("character");
      if (!pointsContainer || !character) return;
      const activeBtn = pointsContainer.querySelector(`button[data-point-index="${currentPointIndex}"]`);
      character.style.backgroundImage =
        currentPointIndex === 3 ? "url('../PICTURE/ambulance.svg')" : "url('" + baseCyclist + "')";
      if (activeBtn) {
        const containerRect = pointsContainer.getBoundingClientRect();
        const btnRect = activeBtn.getBoundingClientRect();
        const leftOffset = btnRect.left - containerRect.left + btnRect.width / 2;
        character.style.left = leftOffset + "px";
      }
    }

    document.getElementById("character").addEventListener("transitionend", function() {
      this.style.backgroundImage = `url('${characterScenes[currentPointIndex]}')`;
    });

    /********************************************************
     * FONCTION : LOAD POINT
     ********************************************************/
    function loadPoint(index) {
      currentPointIndex = index;
      watchedCount = 0;
      const pointData = pointsData[index];
      const container = document.getElementById("image-container");
      container.innerHTML = "";

      // Insertion de l'image de fond du point
      const img = document.createElement("img");
      img.className = "bg-image";
      img.src = pointData.image;
      container.appendChild(img);

      // Création des zones cliquables
      pointData.zones.forEach((zoneData, i) => {
        const zone = document.createElement("div");
        zone.className = "clickable-zone";

        // Dimensions par défaut ou définies
        zone.style.width = zoneData.width || "100px";
        zone.style.height = zoneData.height || "100px";

        // Positionnement si défini
        if (zoneData.top) zone.style.top = zoneData.top;
        if (zoneData.left) zone.style.left = zoneData.left;
        if (zoneData.right) zone.style.right = zoneData.right;
        if (zoneData.bottom) zone.style.bottom = zoneData.bottom;
        if (zoneData.transform) zone.style.transform = zoneData.transform;

        zone.dataset.zoneIndex = i;
        zone.dataset.watched = "false";
        zone.addEventListener("click", function(){
          if(zone.dataset.watched === "true") return;
          playVideoForZone(i);
        });
        container.appendChild(zone);
      });
      updateProgressBar();
    }

    /********************************************************
     * FONCTION : PLAY VIDEO POUR UNE ZONE
     ********************************************************/
    function playVideoForZone(zoneIndex) {
      const videoSource = pointsData[currentPointIndex].zones[zoneIndex].video;
      const overlay = document.createElement("div");
      overlay.className = "video-overlay";

      const videoCard = document.createElement("div");
      videoCard.className = "video-card";
      videoCard.addEventListener("click", (e) => e.stopPropagation());

      const video = document.createElement("video");
      video.setAttribute("playsinline", "");
      video.setAttribute("controls", "");
      const source = document.createElement("source");
      source.src = videoSource;
      source.type = "video/mp4";
      video.appendChild(source);

      videoCard.appendChild(video);
      overlay.appendChild(videoCard);
      document.body.appendChild(overlay);

      setTimeout(() => {
        videoCard.classList.add("show");
      }, 100);

      video.addEventListener("loadedmetadata", function(){
        video.currentTime = 10;
      }, { once: true });

      video.play();

      overlay.addEventListener("click", function() {
        videoCard.classList.remove("show");
        setTimeout(() => overlay.remove(), 500);
      });

      video.addEventListener("ended", function(){
        videoCard.classList.remove("show");
        setTimeout(() => overlay.remove(), 500);

        const container = document.getElementById("image-container");
        const zones = container.querySelectorAll(".clickable-zone");
        zones[zoneIndex].dataset.watched = "true";
        watchedCount++;
        if(watchedCount >= pointsData[currentPointIndex].zones.length) {
          setTimeout(() => { nextPoint(); }, 1000);
        }
      });
    }

    /********************************************************
     * FONCTION : PASSER AU POINT SUIVANT
     ********************************************************/
    function nextPoint() {
      if(currentPointIndex < pointsData.length - 1) {
        loadPoint(currentPointIndex + 1);
        updateProgressBar();
      } else {
        console.log("Tous les points sont terminés.");
      }
    }

    /********************************************************
     * INITIALISATION
     ********************************************************/
    document.addEventListener("DOMContentLoaded", function(){
      loadProgressBar();
      loadPoint(0);
    });
  </script>
</body>
</html>

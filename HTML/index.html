<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>- La maison des livreurs Vidéo</title>
  <style>
    /* Barre de navigation */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 9999;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-size: 16px;
      padding: 10px 20px;
      transition: 0.3s;
    }
    nav a:hover {
      background: rgba(255,255,255,0.2);
      border-radius: 5px;
    }

    /* Styles généraux */
    body {
      margin: 0;
      padding: 0;
      background-color: #525050;
      font-family: sans-serif;
      overflow: hidden;
    }
    .background-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('background.jpg') no-repeat center center;
      background-size: cover;
      z-index: 1;
    }
    .background-image::after {
      content:"";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7));
      z-index: 2;
    }

    /* Contenu principal */
    .main-content {
      margin-top: 50px;
      margin-bottom: 100px;
      height: calc(100vh - 50px - 100px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 3;
    }
    .image-container {
      position: relative;
      width: 80%;
      max-width: 700px;
      height: 500px;
      border: 2px solid transparent;
    }
    .image-container .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 0;
    }
    .clickable-zone {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 2px solid;
      cursor: pointer;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 1;
    }
    .clickable-zone:hover {
      transform: scale(1.1);
      opacity: 0.9;
    }

    /* Overlay pour griser le fond lors de l'affichage de la vidéo */
    .video-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Vidéo pop-up */
    .video-card {
      position: relative;
      width: 60%;
      max-width: 600px;
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .video-card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .video-card video {
      width: 100%;
      display: block;
    }

    /* Barre de progression transformée en route animée */
    .chemin-progression {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: #000;
      overflow: hidden;
      z-index: 50;
    }
    .progress-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    /* Ligne blanche animée pour simuler la route en mouvement */
    .moving-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 200%;
      height: 4px;
      background: repeating-linear-gradient(
              to right,
              transparent,
              transparent 40px,
              white 40px,
              white 60px
      );
      transform: translateY(-50%);
      animation: moveLine 10s linear infinite;  /* Durée augmentée pour ralentir l'animation */
    }
    @keyframes moveLine {
      0% {
        transform: translateX(0) translateY(-50%);
      }
      100% {
        transform: translateX(-50%) translateY(-50%);
      }
    }
    /* Positionnement et style des points */
    .points-container {
      position: absolute;
      top: 50%;
      left: 5%;
      width: 90%;
      display: flex;
      justify-content: space-between;
      transform: translateY(-50%);
      z-index: 60;
    }
    .points-container button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #ff6347;
      border: 4px solid #fff;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .points-container button:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .points-container button.point-actif {
      background-color: #333;
      border-color: #ff6347;
      box-shadow: 0 0 10px rgba(255, 99, 71, 0.8);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .labels-container {
      position: absolute;
      bottom: 5px;
      left: 5%;
      width: 90%;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
      color: #fff;
      z-index: 60;
    }
    .labels-container span {
      width: 40px;
      text-align: center;
    }

    /* Cycliste (character) : visible tout le temps, transition et image dynamique */
    /* Cycliste (character) : visible tout le temps, transition et image dynamique */
    .character {
      position: absolute;
      top: 0px;  /* Ajusté pour que l'icône soit entièrement visible */
      width: 40px;
      height: 40px;
      background-size: contain;
      background-repeat: no-repeat;
      transform: translateX(-50%);
      transition: left 5s ease;
      z-index: 80;
    }

  </style>
</head>
<body>
<!-- Barre de navigation -->
<nav>
  <a href="accueil.html">Accueil</a>
  <a href="#">Vidéos</a>
  <a href="#">Vidéo linéaire</a>
  <a href="credits.html">Crédits</a>
</nav>

<!-- Arrière-plan -->
<div class="background-image"></div>

<!-- Contenu principal -->
<div class="main-content">
  <div class="image-container" id="image-container">
    <!-- L'image et les zones cliquables seront générées dynamiquement -->
  </div>
</div>

<!-- Route animée en bas de page -->
<div class="chemin-progression" id="progress-bar">
  <div class="progress-container">
    <!-- Ligne animée de la route -->
    <div class="moving-line"></div>
    <!-- Points de progression -->
    <div class="points-container" id="points-container">
      <!-- Boutons insérés dynamiquement -->
    </div>
    <!-- Labels sous les points -->
    <div class="labels-container" id="labels-container">
      <!-- Étiquettes insérées dynamiquement -->
    </div>
    <!-- Cycliste : il se déplace en mode base, et change une fois arrivé sur le point -->
    <div id="character" class="character"></div>
  </div>
</div>

<!-- Container pour les video-cards générées dynamiquement (sera créé avec l'overlay) -->
<div id="video-card-container"></div>

<script>
  /*********************
   * Données et Variables
   *********************/
          // Image du cycliste en mode base (lors du déplacement)
  const baseCyclist = "../PICTURE/cycliste_base.png";
  // Images à utiliser quand le cycliste est sur un point (mode "scene")
  const cyclistScenes = [
    "../PICTURE/cycliste_scene1.png",
    "../PICTURE/cycliste_scene2.png",
    "../PICTURE/cycliste_scene3.png",
    "../PICTURE/cycliste_scene4.png"
  ];

  // Chaque point possède une image de fond et des zones avec des vidéos
  const pointsData = [
    {
      image: "../PICTURE/newfond.png",
      zones: [
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0094.mp4" }
      ]
    },
    {
      image: "../PICTURE/newfond.png",
      zones: [
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0096.mp4" }
      ]
    },
    {
      image: "../PICTURE/newfond.png",
      zones: [
        { video: "../PICTURE/MVI_0094.mp4" },
        { video: "../PICTURE/MVI_0093.mp4" }
      ]
    },
    {
      image: "../PICTURE/newfond.png",
      zones: [
        { video: "MVI_0103.mp4" }
      ]
    }
  ];
  let currentPointIndex = 0;
  let watchedCount = 0; // Nombre de vidéos visionnées dans le point courant

  /*********************
   * Fonctions de chargement
   *********************/
  function loadProgressBar() {
    const pointsContainer = document.getElementById("points-container");
    const labelsContainer = document.getElementById("labels-container");
    pointsContainer.innerHTML = "";
    labelsContainer.innerHTML = "";

    // Création des 4 points
    pointsData.forEach((pt, index) => {
      const btn = document.createElement("button");
      btn.dataset.pointIndex = index;
      if (index === currentPointIndex) {
        btn.classList.add("point-actif");
      }
      pointsContainer.appendChild(btn);

      const label = document.createElement("span");
      if(index === 0) label.textContent = "Santé";
      else if(index === 1) label.textContent = "Accidents";
      else if(index === 2) label.textContent = "Aides";
      else if(index === 3) label.textContent = "Légal";
      labelsContainer.appendChild(label);

      // Navigation manuelle (optionnelle)
      btn.addEventListener("click", () => {
        currentPointIndex = index;
        // Lors du changement de point, on remet le cycliste en mode base
        const character = document.getElementById("character");
        character.style.backgroundImage = `url('${baseCyclist}')`;
        loadPoint(currentPointIndex);
        updateProgressBar();
      });
    });
    updateCharacterPosition();
  }

  function updateCharacterPosition() {
    const pointsContainer = document.getElementById("points-container");
    if (!pointsContainer) return;
    const activeBtn = pointsContainer.querySelector(`button[data-point-index="${currentPointIndex}"]`);
    const character = document.getElementById("character");
    // Pendant le déplacement, utiliser le cycliste en mode base
    character.style.backgroundImage = `url('${baseCyclist}')`;
    if (activeBtn) {
      const containerRect = pointsContainer.getBoundingClientRect();
      const btnRect = activeBtn.getBoundingClientRect();
      // Calculer le centre du bouton
      const leftOffset = btnRect.left - containerRect.left + btnRect.width / 2;
      character.style.left = leftOffset + "px";
    }
  }

  // Lorsque la transition (déplacement) se termine, on passe en mode "scene" pour le point courant
  document.getElementById("character").addEventListener("transitionend", function() {
    this.style.backgroundImage = `url('${cyclistScenes[currentPointIndex]}')`;
  });

  function updateProgressBar() {
    const pointsContainer = document.getElementById("points-container");
    if (!pointsContainer) return;
    pointsContainer.querySelectorAll("button").forEach(btn => btn.classList.remove("point-actif"));
    const activeBtn = pointsContainer.querySelector(`button[data-point-index="${currentPointIndex}"]`);
    if (activeBtn) {
      activeBtn.classList.add("point-actif");
    }
    updateCharacterPosition();
  }

  function loadPoint(index) {
    currentPointIndex = index;
    watchedCount = 0;
    const pointData = pointsData[index];
    const container = document.getElementById("image-container");
    container.innerHTML = "";

    // Insérer l'image de fond du point
    const img = document.createElement("img");
    img.className = "bg-image";
    img.src = pointData.image;
    container.appendChild(img);

    // Générer les zones cliquables selon le nombre de zones du point
    const zonesCount = pointData.zones.length;
    let positions = [];
    if(zonesCount === 4) {
      positions = [
        { top: "20%", left: "10%" },
        { top: "20%", right: "10%" },
        { bottom: "20%", left: "10%" },
        { bottom: "20%", right: "10%" }
      ];
    } else if(zonesCount === 3) {
      positions = [
        { top: "20%", left: "10%" },
        { top: "20%", right: "10%" },
        { bottom: "20%", left: "50%", transform: "translateX(-50%)" }
      ];
    } else if(zonesCount === 2) {
      positions = [
        { top: "50%", left: "20%" },
        { top: "50%", right: "20%" }
      ];
    } else {
      for(let i = 0; i < zonesCount; i++){
        positions.push({ top: "50%", left: (10 + i*10) + "%" });
      }
    }

    for(let i = 0; i < zonesCount; i++){
      const zone = document.createElement("div");
      zone.className = "clickable-zone";
      const pos = positions[i] || {};
      for(let prop in pos) {
        zone.style[prop] = pos[prop];
      }
      zone.dataset.zoneIndex = i;
      zone.dataset.watched = "false";
      zone.addEventListener("click", function(){
        if(zone.dataset.watched === "true") return;
        playVideoForZone(i);
      });
      container.appendChild(zone);
    }
    updateProgressBar();
  }

  /*********************
   * Lecture vidéo et transition
   *********************/
  function playVideoForZone(zoneIndex) {
    // Récupérer la vidéo associée à la zone
    const videoSource = pointsData[currentPointIndex].zones[zoneIndex].video;

    // Créer un overlay pour griser le fond
    const overlay = document.createElement("div");
    overlay.className = "video-overlay";

    // Créer la carte vidéo à l'intérieur de l'overlay
    const videoCard = document.createElement("div");
    videoCard.className = "video-card";

    // Empêcher le clic sur la vidéo de fermer l'overlay
    videoCard.addEventListener("click", function(e) {
      e.stopPropagation();
    });

    const video = document.createElement("video");
    video.setAttribute("playsinline", "");
    video.setAttribute("controls", "");
    const source = document.createElement("source");
    source.src = videoSource;
    source.type = "video/mp4";
    video.appendChild(source);
    videoCard.appendChild(video);
    overlay.appendChild(videoCard);
    document.body.appendChild(overlay);

    // Afficher la carte vidéo
    setTimeout(() => {
      videoCard.classList.add("show");
    }, 100);

    video.addEventListener("loadedmetadata", function(){
      video.currentTime = 10;
    }, { once: true });

    video.play();

    // Fermer la vidéo en cliquant sur l'overlay (hors de la vidéo)
    overlay.addEventListener("click", function() {
      videoCard.classList.remove("show");
      setTimeout(() => {
        overlay.remove();
      }, 500);
    });

    // Lorsqu'elle se termine, fermer la vidéo
    video.addEventListener("ended", function(){
      videoCard.classList.remove("show");
      setTimeout(() => {
        overlay.remove();
      }, 500);
      const container = document.getElementById("image-container");
      const zones = container.querySelectorAll(".clickable-zone");
      zones[zoneIndex].dataset.watched = "true";
      watchedCount++;
      if(watchedCount >= pointsData[currentPointIndex].zones.length) {
        setTimeout(() => { nextPoint(); }, 1000);
      }
    });
  }

  function nextPoint() {
    if(currentPointIndex < pointsData.length - 1) {
      loadPoint(currentPointIndex + 1);
      updateProgressBar();
    } else {
      console.log("Tous les points sont terminés.");
    }
  }

  /*********************
   * Initialisation
   *********************/
  document.addEventListener("DOMContentLoaded", function(){
    loadProgressBar();
    loadPoint(0);
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - La Maison des Livreurs</title>
  <link rel="stylesheet" href="../CSS/accueil.css">
  <script src="../JS/accueil.js">defer</script>
</head>
<body>
  <div id="splash">
    <img src="../PICTURE/mmilogo.png" alt="Logo MMI">
  </div>
  <div class="intro">
    <div class="intro-header">
      <div class="intro-title">
        <h1>La Maison des Livreurs</h1>
      </div>
      <div class="intro-byline">
        <p>Réalisé par MMI Bordeaux</p>

      <button class="intro-begin">Commencer</button>
      <button class="credit">Crédit</button>

  <div class="transition-overlay">
    <div class="transition-message">
      <p class="msg1">Pour cette expérience, des écouteurs sont conseillés</p>
      <p class="msg2">Dans cette expérience vous devez cliquer sur des zones pour visionner des vidéos</p>
    </div>

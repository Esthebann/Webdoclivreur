<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - The House of Couriers</title>
  <link rel="stylesheet" href="../CSS/accueil.css">
  <!-- Inclusion du script externe pour la version anglaise -->
  <script src="../JS/accueilen.js" defer></script>
  <style>
    /* Style général pour les images afin de préserver leur ratio */
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    /* Container du menu déroulant de langue */
    .lang-dropdown {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
    /* Bouton affichant la langue courante */
    .lang-dropbtn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    /* Conteneur du contenu déroulant */
    .lang-dropdown-content {
      display: none;
      position: absolute;
      right: 0;
      background-color: #f9f9f9;
      min-width: 150px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
      z-index: 1001;
      border-radius: 4px;
      overflow: hidden;
    }
    /* Liens à l'intérieur du menu déroulant */
    .lang-dropdown-content a {
      color: black;
      padding: 8px 12px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.2s;
    }
    .lang-dropdown-content a:hover {
      background-color: #ddd;
    }
    /* Afficher le menu au survol du conteneur */
    .lang-dropdown:hover .lang-dropdown-content {
      display: block;
    }
    /* Ajustement des images des drapeaux */
    .lang-dropdown-content a img,
    .lang-dropbtn img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <!-- Menu déroulant pour le sélecteur de langue -->
  <div class="lang-dropdown">
    <!-- Bouton affichant la langue actuelle (ici English) -->
    <button class="lang-dropbtn" title="Choose a language">
      <img src="../PICTURE/drapeeauanglais.png" alt="English">
    </button>
    <!-- Contenu du menu déroulant -->
    <div class="lang-dropdown-content">
      <a href="../HTML/accueil.html" title="Français">
        <img src="../PICTURE/drapeaufr.png" alt="Français"> Français
      </a>
      <a href="../HTML/accueilen.html" title="English">
        <img src="../PICTURE/drapeeauanglais.png" alt="English"> English
      </a>
      <a href="../HTML/accueilesp.html" title="Español">
        <img src="../PICTURE/drapeauespagnol.png" alt="Español"> Español
      </a>
    </div>
  </div>

  <div id="splash">
    <img src="../PICTURE/mmilogo.png" alt="MMI Logo">
  </div>
  <div class="intro">
    <div class="intro-header">
      <div class="intro-title">
        <h1>The House of Couriers</h1>
      </div>
      <div class="intro-byline">
        <p>Made by MMI Bordeaux</p>
      </div>
    </div>
    <div class="button-container">
      <button class="intro-begin">Start</button>
      <button class="credit">Credits</button>
    </div>
  </div>
  <div class="transition-overlay">
    <div class="transition-message">
      <p class="msg1">To fully enjoy the experience, we suggest you use headphones</p>
      <p class="msg2">In this experiment, discrete areas are highlighted when hovering. Click on them to view the videos.</p>
    </div>
  </div>
</body>
</html>

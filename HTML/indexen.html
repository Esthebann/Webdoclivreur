<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Image Zoom Without Nav and Route</title>
  <!-- Lien vers le fichier CSS spécifique à la version anglaise -->
  <link rel="stylesheet" href="..//CSS/index.css">
</head>
<body>
  <!-- NAV (50px) -->
  <nav>
    <a href="../HTML/accueilen.html">Home</a>
    <a href="#">Videos</a>
    <!-- Menu déroulant pour la langue -->
    <div class="dropdown">
      <a class="dropbtn">Language</a>
      <div class="dropdown-content">
        <a href="index.html">Français</a>
        <a href="indexen.html">English</a>
        <a href="indexes.html">Español</a>
      </div>
    </div>
    <a href="creditsen.html">Credits</a>
  </nav>

  <!-- Blurred background image -->
  <div class="background-image">
    <img src="../PICTURE/accidentsfond.png" alt="Background">
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="image-container" id="image-container">
      <!-- The background image and clickable zones will be dynamically inserted -->
    </div>
  </div>

  <!-- Animated route (80px) at the bottom -->
  <div class="chemin-progression" id="progress-bar">
    <div class="progress-container">
      <div class="moving-line"></div>
      <div class="points-container" id="points-container"></div>
      <div id="character" class="character"></div>
    </div>
  </div>

  <!-- Container for dynamic video cards -->
  <div id="video-card-container"></div>

  <!-- Inclusion of the English-specific JavaScript file -->
  <script src="..//JS/indexen.js"></script>
</body>
</html>
